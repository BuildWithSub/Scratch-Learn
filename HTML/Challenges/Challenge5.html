<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge 5</title>
  <style>
    p{
      font-family: arial;
      margin-top: 0px;
      margin-bottom: 0px;
    }
    .profile-preview{
      margin-top: 5px;
      margin-bottom: 12px;      
    }
    .display-picture{
      width: 50px;
      display: inline-block;
      vertical-align: middle;
    }
    .profile-info{
      display: inline-block;
      vertical-align: middle;
    }
    .button-container{
      display: inline-block;
      margin-left: 100px;
    }
    .profile-picture{
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius:50%;
    }
    .name{
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 3px;
    }
    .name-tag,
    .popularity{
      font-size: 14px;
      color: rgb(96,96,96);
    }
    .name-tag{
      margin-bottom: 3px;
    }
    .follow-button{
      padding: 8px 10px;
      font-weight: bold;
      font-size: 14px;
      font-family: arial;
      border: none;
      border-radius: 4px;
      background-color: rgb(0, 139, 214);
      color: white;
      cursor: pointer;
      transition: hover 0.5s;

    }
    .follow-button:hover{
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);;
    }
    


    
  </style>
</head>
<body>
 <div class="profile-preview">
  <div class="display-picture">
    <img class="profile-picture" src="/HTML/Challenges/Images/alvan-nee-ZCHj_2lJP00-unsplash.jpg" alt=""></div>
  <div class="profile-info">
    <p class="name">Oliver</p>
    <p class="name-tag">the cat</p>
    <p class="popularity">Popular</p>
  </div>
  <div class="button-container">
    <button class="follow-button">Follow</button>
  </div>
 </div>

 <div class="profile-preview">
  <div class="display-picture">
    <img class="profile-picture" src="/HTML/Challenges/Images/charlesdeluvio-Mv9hjnEUHR4-unsplash.jpg" alt=""></div>
  <div class="profile-info">
    <p class="name">Mimi</p>
    <p class="name-tag">Sleepy cat</p>
    <p class="popularity">Popular</p>
  </div>
  <div class="button-container">
    <button class="follow-button">Follow</button>
  </div>
 </div>
</body>
</html>
